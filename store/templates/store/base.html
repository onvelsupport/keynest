{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}KeyNest Giveaway{% endblock %}</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:
    radial-gradient(circle at top left,#eef6ff 0,transparent 30%),
    radial-gradient(circle at bottom right,#fff3df 0,transparent 35%),
    #f8fafc;
    color:#111827;
}

.page-shell{
    min-height:100vh;
    padding:40px 8%;
}

.nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:80px;
}

.logo{
    font-size:32px;
    font-weight:900;
    letter-spacing:-1px;
}

.badge{
    background:white;
    border:1px solid #e2e8f0;
    padding:10px 16px;
    border-radius:999px;
    font-size:14px;
    font-weight:700;
}

.hero{
    display:grid;
    grid-template-columns:1.1fr 450px;
    gap:80px;
    align-items:center;
}

.pill{
    display:inline-block;
    background:#111827;
    color:white;
    padding:10px 18px;
    border-radius:999px;
    font-size:14px;
    font-weight:700;
    margin-bottom:25px;
}

.hero h1{
    font-size:76px;
    line-height:.95;
    letter-spacing:-4px;
    margin-bottom:25px;
}

.hero p{
    font-size:20px;
    color:#475569;
    line-height:1.7;
    max-width:600px;
}

.features{
    display:flex;
    gap:12px;
    margin-top:35px;
    flex-wrap:wrap;
}

.features span{
    background:white;
    border:1px solid #e5e7eb;
    border-radius:999px;
    padding:12px 18px;
    font-size:14px;
    font-weight:600;
}

.card{
    background:white;
    border-radius:32px;
    padding:35px;
    box-shadow:0 40px 100px rgba(0,0,0,.08);
}

.card h2{
    font-size:30px;
    margin-bottom:10px;
}

.card p{
    color:#64748b;
    margin-bottom:25px;
}

.field{
    margin-bottom:18px;
}

.field label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    font-weight:700;
}

.field input{
    width:100%;
    height:56px;
    border:1px solid #d1d5db;
    border-radius:16px;
    padding:0 15px;
    font-size:15px;
}

.field input:focus{
    outline:none;
    border-color:#111827;
}

.checkbox{
    display:flex;
    align-items:center;
    gap:10px;
    margin:20px 0;
}

.submit-btn{
    width:100%;
    height:58px;
    border:none;
    border-radius:18px;
    background:#111827;
    color:white;
    font-size:16px;
    font-weight:800;
    cursor:pointer;
}

.submit-btn:hover{
    opacity:.9;
}

@media(max-width:950px){

.hero{
    grid-template-columns:1fr;
}

.hero h1{
    font-size:48px;
}

}

</style>

</head>
<body>

{% block content %}
{% endblock %}

<script>

document.addEventListener("DOMContentLoaded", function() {
    console.log("KeyNest Giveaway Loaded");
});

</script>

</body>
</html>
