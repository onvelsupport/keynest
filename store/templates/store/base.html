<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}KeyNest Giveaway{% endblock %}</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
    overflow-x:hidden;
}

body{
    font-family:'Inter',sans-serif;
    background:
    radial-gradient(circle at top left,#eef6ff 0,transparent 30%),
    radial-gradient(circle at bottom right,#fff3df 0,transparent 35%),
    #f8fafc;
    color:#111827;
    overflow-x:hidden;
}

.dob-field input{
    max-width:220px;
}

.page-shell{
    min-height:100vh;
    padding:40px 8%;
}

.nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:80px;
}

.logo{
    font-size:32px;
    font-weight:900;
    letter-spacing:-1px;
}

.badge{
    background:white;
    border:1px solid #e2e8f0;
    padding:10px 16px;
    border-radius:999px;
    font-size:14px;
    font-weight:700;
    color:#111827;
}

.hero{
    display:grid;
    grid-template-columns:minmax(0,1fr) 450px;
    gap:60px;
    align-items:start;
    overflow:hidden;
}

.pill{
    display:inline-block;
    background:#111827;
    color:white;
    padding:10px 18px;
    border-radius:999px;
    font-size:14px;
    font-weight:700;
    margin-bottom:25px;
}

.hero h1{
    font-size:clamp(46px,5.5vw,76px);
    line-height:.95;
    letter-spacing:-4px;
    margin-bottom:25px;
    max-width:760px;
}

.hero p{
    font-size:20px;
    color:#475569;
    line-height:1.7;
    max-width:600px;
}

.features{
    display:flex;
    gap:12px;
    margin-top:35px;
    flex-wrap:wrap;
}

.features span{
    background:white;
    border:1px solid #e5e7eb;
    border-radius:999px;
    padding:12px 18px;
    font-size:14px;
    font-weight:600;
}

.card{
    background:white;
    border-radius:32px;
    padding:35px;
    box-shadow:0 20px 60px rgba(0,0,0,.08);
    border:1px solid #e5e7eb;
}

.card h2{
    font-size:30px;
    margin-bottom:10px;
}

.card p{
    color:#64748b;
    margin-bottom:25px;
}

.field{
    margin-bottom:18px;
}

.field label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    font-weight:700;
}

.field input,
.field select,
.field textarea{
    width:100%;
    border:1px solid #d1d5db;
    border-radius:16px;
    padding:14px 15px;
    font-size:15px;
    transition:.2s;
}

.field input{
    height:56px;
}

.field input:focus,
.field select:focus,
.field textarea:focus{
    outline:none;
    border-color:#111827;
    box-shadow:0 0 0 4px rgba(17,24,39,.08);
}

.checkbox{
    display:flex;
    align-items:center;
    gap:10px;
    margin:20px 0;
    font-size:14px;
}

.submit-btn{
    width:100%;
    height:58px;
    border:none;
    border-radius:18px;
    background:#111827;
    color:white;
    font-size:16px;
    font-weight:800;
    cursor:pointer;
    transition:.2s;
}

.submit-btn:hover{
    transform:translateY(-1px);
    box-shadow:0 12px 30px rgba(17,24,39,.15);
}

.logo-slider{
    overflow:hidden;
    width:100%;
    max-width:760px;
    margin:30px 0 40px;
    position:relative;
}

.logo-track{
    display:flex;
    gap:20px;
    width:max-content;
    animation:scrollLogos 20s linear infinite;
}

.logo-track img{
    height:55px;
    width:auto;
    background:#fff;
    border-radius:14px;
    padding:12px 18px;
    border:1px solid #e5e7eb;
    flex-shrink:0;
}

@keyframes scrollLogos{
    from{
        transform:translateX(0);
    }

    to{
        transform:translateX(-50%);
    }
}

.logo-slider::before,
.logo-slider::after{
    content:"";
    position:absolute;
    top:0;
    width:80px;
    height:100%;
    z-index:2;
}

.logo-slider::before{
    left:0;
    background:linear-gradient(
        to right,
        #f8fafc,
        transparent
    );
}

.logo-slider::after{
    right:0;
    background:linear-gradient(
        to left,
        #f8fafc,
        transparent
    );
}

.footer{
    text-align:center;
    margin-top:80px;
    color:#6b7280;
    font-size:14px;
}

@media(max-width:950px){

    .dob-field input{
        max-width:100%;
    }

    .page-shell{
        padding:24px;
    }

    .nav{
        margin-bottom:40px;
    }

    .hero{
        grid-template-columns:1fr;
        gap:40px;
        overflow:visible;
    }

    .hero h1{
        font-size:46px;
        letter-spacing:-2px;
    }

    .logo-slider{
        max-width:100%;
    }

    .card{
        padding:24px;
    }
}

</style>

</head>
<body>

{% block content %}
{% endblock %}

<script>
document.addEventListener("DOMContentLoaded", () => {
    console.log("KeyNest loaded");
});
</script>

</body>
</html>
